name: Build, Push, and Deploy to ECS - lirw node monolith ec2

on:
  push:
    branches:
      - lirw-node-monolith
    paths:
      - "lirw-node-monolith/**"
      - ".github/workflows/**" # Triggers if you update this pipeline file
  workflow_dispatch: # Allows you to trigger deployments/secret rotations manually via the GitHub UI

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: webapp-dev
  ECS_SERVICE: webapp-service-dev
  ECS_CLUSTER: ecs-cluster-dev
  ECS_TASK_DEFINITION: task-definition.json
  CONTAINER_NAME: webapp
  PROJECT_NAME: ECS-Fargate-ALB # MUST match the var.project_name used in your Terraform

# REQUIRED FOR OIDC
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ env.AWS_REGION }}

      # ---------------------------------------------------------
      # BUILD & DEPLOY
      # ---------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          # IMAGE_TAG: latest
        run: |
          cd lirw-node-monolith-app
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # Output the image URI for the next step
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # INJECT VARIABLES (The CI/CD equivalent of .tfvars)
      # ---------------------------------------------------------
      - name: Inject Environment Variables into JSON
        env:
          ENV_VAR: ${{ vars.ENV_VAR }}
          APP_CPU: ${{ vars.APP_CPU }}
          APP_MEMORY: ${{ vars.APP_MEMORY }}
          ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
        run: |
          # 1. envsubst reads the template and writes to a temporary file
          envsubst < ${{ env.ECS_TASK_DEFINITION }} > temp.json

          # 2. Overwrite the original file in the GitHub runner's memory
          mv temp.json ${{ env.ECS_TASK_DEFINITION }}

          echo "Successfully injected variables into ${{ env.ECS_TASK_DEFINITION }}"

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
