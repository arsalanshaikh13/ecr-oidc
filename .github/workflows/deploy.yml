name: Build, Push, and Deploy to ECS

on:
  push:
    branches:
      - main
      - fargate
    paths:
      - "frontend/**"
      - ".github/workflows/**" # Triggers if you update this pipeline file
  workflow_dispatch: # Allows you to trigger deployments/secret rotations manually via the GitHub UI

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: webapp-dev
  ECS_SERVICE: webapp-service-dev
  ECS_CLUSTER: ecs-cluster-dev
  ECS_TASK_DEFINITION: task-definition.json
  CONTAINER_NAME: webapp
  PROJECT_NAME: ECS-Fargate-ALB # MUST match the var.project_name used in your Terraform

# REQUIRED FOR OIDC
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::513410254332:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ env.AWS_REGION }}

      # ---------------------------------------------------------
      # IDEMPOTENT SECRET SYNC
      # ---------------------------------------------------------
      - name: Sync  Secret to AWS Secrets Manager
        env:
          SECRET_ID: "${{ env.PROJECT_NAME }}-secret"
          SECRET_VALUE: ${{ secrets.APP_SECRET_KEY }}
        run: |
          # 1. Fetch the current secret from AWS (suppress errors if it hasn't been created yet)
          CURRENT_SECRET=$(aws secretsmanager get-secret-value --secret-id $SECRET_ID --query 'SecretString' --output text 2>/dev/null || echo "NOT_FOUND")

          # 2. Compare and update only if the value has changed
          if [ "$CURRENT_SECRET" != "$SECRET_VALUE" ]; then
            echo "Changes detected or secret missing. Pushing new plaintext value to AWS..."
            JSON_STRING=$(jq -n --arg key "$SECRET_VALUE" '{APP_SECRET_KEY: $key}')

            # Push the new value to AWS Secrets Manager
            aws secretsmanager put-secret-value \
              --secret-id $SECRET_ID \
              --secret-string "$JSON_STRING"
            
            echo "Successfully updated secret: $SECRET_ID"

          else
            echo "Secret matches existing AWS version. Skipping update."
          fi

      # ---------------------------------------------------------
      # BUILD & DEPLOY
      # ---------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          # IMAGE_TAG: latest
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # Output the image URI for the next step
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # INJECT VARIABLES (The CI/CD equivalent of .tfvars)
      # ---------------------------------------------------------
      - name: Inject Environment Variables into JSON
        env:
          ENV_VAR: ${{ vars.ENV_VAR }}
          APP_CPU: ${{ vars.APP_CPU }}
          APP_MEMORY: ${{ vars.APP_MEMORY }}
        run: |
          # 1. envsubst reads the template and writes to a temporary file
          envsubst < ${{ env.ECS_TASK_DEFINITION }} > temp.json

          # 2. Overwrite the original file in the GitHub runner's memory
          mv temp.json ${{ env.ECS_TASK_DEFINITION }}

          echo "Successfully injected variables into ${{ env.ECS_TASK_DEFINITION }}"

      # ---------------------------------------------------------
      # INJECT DYNAMIC ARN INTO TASK DEFINITION
      # ---------------------------------------------------------
      - name: Inject Secret ARN into Task Definition
        env:
          SECRET_ID: "${{ env.PROJECT_NAME }}-secret"
        run: |
          # 1. Ask AWS for the exact ARN of the secret
          EXACT_ARN=$(aws secretsmanager describe-secret --secret-id $SECRET_ID --query 'ARN' --output text)

          echo "Found Secret ARN: $EXACT_ARN"

          # 2. Replace the placeholder in the JSON file with the real ARN
          sed -i "s|<APP_SECRET_ARN>|$EXACT_ARN|g" ${{ env.ECS_TASK_DEFINITION }}

          echo "Successfully injected ARN into task-definition.json"

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
