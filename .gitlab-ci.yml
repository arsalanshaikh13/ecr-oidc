stages:
  - build
  - prepare
  - deploy

variables:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: webapp-dev
  ECS_SERVICE: webapp-service-dev
  ECS_CLUSTER: ecs-cluster-dev
  ECS_TASK_DEFINITION: task-definition.json
  CONTAINER_NAME: webapp
  PROJECT_NAME: ECS-Fargate-ALB

# ---------------------------------------------------------
# GLOBAL CONFIGURATION (Applies to all AWS jobs)
# ---------------------------------------------------------
default:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - apk add --no-cache aws-cli jq gettext
    - >
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
      $(aws sts assume-role-with-web-identity
      --role-arn arn:aws:iam::${ACCOUNT_ID}:role/GitLabActions-ECS-DeployRole
      --role-session-name "GitLabRunner-${CI_PIPELINE_ID}"
      --web-identity-token ${GITLAB_OIDC_TOKEN}
      --duration-seconds 3600
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
      --output text))

# ---------------------------------------------------------
# STAGE 1: BUILD & PUSH
# ---------------------------------------------------------
build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
    - export IMAGE_TAG=$CI_COMMIT_SHA
    - export FULL_IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

    - cd frontend
    - docker build -t $FULL_IMAGE_URI .
    - docker push $FULL_IMAGE_URI

    # Save the exact Image URI to a dotenv file to pass to the next stage
    - echo "FULL_IMAGE_URI=$FULL_IMAGE_URI" > build.env
  artifacts:
    reports:
      dotenv: frontend/build.env # Passes the variable securely downstream

# ---------------------------------------------------------
# STAGE 2: PREPARE MANIFESTS
# ---------------------------------------------------------
prepare_manifest:
  stage: prepare
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - job: build_image # Pulls the FULL_IMAGE_URI from Stage 1
      artifacts: true
  script:
    - export SECRET_ID="${PROJECT_NAME}-secret"

    # 1. Sync Secrets
    - export CURRENT_SECRET=$(aws secretsmanager get-secret-value --secret-id $SECRET_ID --query 'SecretString' --output text 2>/dev/null || echo "NOT_FOUND")
    - |
      if [ "$CURRENT_SECRET" != "$APP_SECRET_KEY" ]; then
        aws secretsmanager put-secret-value --secret-id $SECRET_ID --secret-string "$APP_SECRET_KEY"
      fi

    # 2. Inject Variables
    - envsubst < $ECS_TASK_DEFINITION > temp.json
    - mv temp.json $ECS_TASK_DEFINITION

    # 3. Inject Secret ARN
    - export EXACT_ARN=$(aws secretsmanager describe-secret --secret-id $SECRET_ID --query 'ARN' --output text)
    - sed -i "s|<APP_SECRET_ARN>|$EXACT_ARN|g" $ECS_TASK_DEFINITION

    # 4. Inject Docker Image and create final artifact
    - >
      jq --arg IMAGE "$FULL_IMAGE_URI" --arg CONTAINER "$CONTAINER_NAME" 
      '(.containerDefinitions[] | select(.name == $CONTAINER)).image = $IMAGE' 
      $ECS_TASK_DEFINITION > final-task-def.json

  artifacts:
    paths:
      - final-task-def.json # Save the rendered JSON for the deploy step
    expire_in: 1 hour

# ---------------------------------------------------------
# STAGE 3: DEPLOY
# ---------------------------------------------------------
deploy_ecs:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - job: prepare_manifest # Downloads final-task-def.json
      artifacts: true
  script:
    - REVISION_ARN=$(aws ecs register-task-definition --cli-input-json file://final-task-def.json --query 'taskDefinition.taskDefinitionArn' --output text)
    - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $REVISION_ARN > /dev/null
    - aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE
    - echo "Deployment Successful!"
